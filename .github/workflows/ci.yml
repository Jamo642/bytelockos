name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint black flake8
    
    - name: Format check with Black
      run: black --check ai-engine ui-dashboard/backend
      continue-on-error: true
    
    - name: Lint with Flake8
      run: flake8 ai-engine ui-dashboard/backend --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Type check with Pylint
      run: pylint ai-engine ui-dashboard/backend --disable=all --enable=E
      continue-on-error: true
    
    - name: Run Python tests
      run: |
        pytest --cov=ai-engine --cov=ui-dashboard/backend --cov-report=xml
      continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'ui-dashboard/frontend/package-lock.json'
    
    - name: Install dependencies
      run: cd ui-dashboard/frontend && npm install --legacy-peer-deps
    
    - name: Lint with ESLint
      run: cd ui-dashboard/frontend && npm run lint
      continue-on-error: true
    
    - name: Build frontend
      run: cd ui-dashboard/frontend && npm run build
    
    - name: Check build output
      run: |
        if [ -d "ui-dashboard/frontend/build" ] || [ -d "ui-dashboard/frontend/public" ]; then
          echo "✓ Frontend build successful"
        else
          echo "✗ Frontend build failed - no output directory"
          exit 1
        fi

  rust-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    
    - name: Build OCSF Parser
      run: cd integrations/ocsf-parsers && cargo build --verbose
    
    - name: Build Syslog Receiver
      run: cd integrations/syslog-receiver && cargo build --verbose
    
    - name: Run Rust tests
      run: |
        cd integrations/ocsf-parsers && cargo test --verbose
        cd integrations/syslog-receiver && cargo test --verbose

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-build, rust-build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build AI Engine Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: infrastructure/docker/Dockerfile.ai-engine
        push: false
        tags: bytelockos/ai-engine:test
    
    - name: Build Dashboard Backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: infrastructure/docker/Dockerfile.dashboard-backend
        push: false
        tags: bytelockos/dashboard-backend:test
    
    - name: Build Frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ui-dashboard/frontend
        file: ui-dashboard/frontend/Dockerfile
        push: false
        tags: bytelockos/dashboard-frontend:test

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install bandit for security checks
      run: pip install bandit
    
    - name: Run security scan
      run: bandit -r ai-engine ui-dashboard/backend -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

  summary:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-build, rust-build, docker-build, security-check]
    if: always()
    
    steps:
    - name: Pipeline Status
      run: |
        echo "✓ Linting and Testing: ${{ needs.lint-and-test.result }}"
        echo "✓ Frontend Build: ${{ needs.frontend-build.result }}"
        echo "✓ Rust Build: ${{ needs.rust-build.result }}"
        echo "✓ Docker Build: ${{ needs.docker-build.result }}"
        echo "✓ Security Check: ${{ needs.security-check.result }}"
        
        if [[ "${{ needs.lint-and-test.result }}" == "failure" || \
              "${{ needs.frontend-build.result }}" == "failure" || \
              "${{ needs.rust-build.result }}" == "failure" || \
              "${{ needs.docker-build.result }}" == "failure" ]]; then
          echo "Pipeline failed - please fix errors before merging"
          exit 1
        fi
